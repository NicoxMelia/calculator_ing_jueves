name: CI

on:
  pull_request:
    branches: [main]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Compilar
        uses: ./.github/actions/build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Correr tests
        uses: ./.github/actions/test